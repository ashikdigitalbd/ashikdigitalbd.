<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASHIK DIGITAL BD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f3f4f6; padding: 16px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 20px; border-radius: 24px; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .logo { font-size: 22px; font-weight: bold; color: #ff4f63; }
        .btn { padding: 8px 18px; border-radius: 40px; border: none; cursor: pointer; font-weight: 600; }
        .btn-primary { background: #ff4f63; color: white; }
        .btn-outline { background: transparent; border: 1px solid #ff4f63; color: #ff4f63; }
        .btn-danger { background: #dc2626; color: white; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; margin-top: 16px; }
        .product-item { background: #f9fafb; border-radius: 16px; padding: 16px; border: 1px solid #e5e7eb; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 24px; border-radius: 28px; width: 90%; max-width: 380px; }
        .modal-content input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 16px; }
        .message { padding: 8px; border-radius: 12px; margin: 8px 0; display: none; font-size: 14px; }
        .message.error { background: #fee2e2; color: #dc2626; display: block; }
        .message.success { background: #dcfce7; color: #16a34a; display: block; }
        .admin-layout { display: flex; gap: 20px; flex-wrap: wrap; }
        .sidebar { width: 250px; background: #1f2937; color: white; border-radius: 24px; padding: 20px; }
        .sidebar a { display: block; color: white; padding: 10px; margin: 5px 0; border-radius: 12px; cursor: pointer; }
        .sidebar a:hover { background: #374151; }
        .main-content { flex: 1; }
        .stats { display: flex; gap: 16px; flex-wrap: wrap; }
        .stat-card { background: linear-gradient(135deg, #ff4f63, #ff9f43); color: white; padding: 20px; border-radius: 20px; min-width: 140px; text-align: center; }
        @media (max-width: 700px) { .sidebar { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">ASHIK DIGITAL BD</div>
        <div id="authButtons">
            <button class="btn btn-primary" onclick="showLoginModal()">লগইন</button>
            <button class="btn btn-outline" onclick="showRegisterModal()">রেজিস্টার</button>
        </div>
        <div id="userInfo" style="display: none;">
            <span id="userEmail" style="margin-right: 10px;"></span>
            <button class="btn btn-danger" onclick="logout()">লগআউট</button>
        </div>
    </div>
    <div id="appContent"></div>
</div>

<!-- Login Modal -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3>লগইন</h3>
        <input type="email" id="loginEmail" placeholder="ইমেইল">
        <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড">
        <div id="loginMessage" class="message"></div>
        <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="login()">লগইন</button>
        <button class="btn btn-outline" style="width:100%; margin-top:8px;" onclick="closeModal('loginModal')">বন্ধ</button>
    </div>
</div>

<!-- Register Modal -->
<div id="registerModal" class="modal">
    <div class="modal-content">
        <h3>রেজিস্টার</h3>
        <input type="email" id="regEmail" placeholder="ইমেইল">
        <input type="password" id="regPassword" placeholder="পাসওয়ার্ড">
        <div id="registerMessage" class="message"></div>
        <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="register()">রেজিস্টার</button>
        <button class="btn btn-outline" style="width:100%; margin-top:8px;" onclick="closeModal('registerModal')">বন্ধ</button>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://rvbdzbqjrsavwdbxutfo.supabase.co";
    const SUPABASE_ANON = "sb_publishable_qt8sN5cY-JrxmaKrxSEv5Q_Q4JJdNra";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    
    let currentUser = null;
    let isAdmin = false;

    function showModal(id) { document.getElementById(id).classList.add('active'); }
    window.closeModal = (id) => document.getElementById(id).classList.remove('active');
    
    function showMessage(el, msg, type) {
        let d = document.getElementById(el);
        d.textContent = msg;
        d.className = `message ${type}`;
        setTimeout(() => d.className = 'message', 2500);
    }

    window.showLoginModal = () => { showModal('loginModal'); };
    window.showRegisterModal = () => { showModal('registerModal'); };

    window.login = async () => {
        let email = document.getElementById('loginEmail').value;
        let pwd = document.getElementById('loginPassword').value;
        let { error } = await supabase.auth.signInWithPassword({ email, password: pwd });
        if (error) { showMessage('loginMessage', error.message, 'error'); return; }
        closeModal('loginModal');
        await loadUser();
        loadAppContent();
    };

    window.register = async () => {
        let email = document.getElementById('regEmail').value;
        let pwd = document.getElementById('regPassword').value;
        let { data, error } = await supabase.auth.signUp({ email, password: pwd });
        if (error) { showMessage('registerMessage', error.message, 'error'); return; }
        if (data.user) {
            await supabase.from('profiles').upsert({ id: data.user.id, email, role: 'customer' });
        }
        showMessage('registerMessage', '✅ রেজিস্টার সফল! এখন লগইন করুন', 'success');
        setTimeout(() => { closeModal('registerModal'); showLoginModal(); }, 1200);
    };

    window.logout = async () => {
        await supabase.auth.signOut();
        currentUser = null;
        isAdmin = false;
        loadAppContent();
        updateUI();
    };

    async function loadUser() {
        let { data: { user } } = await supabase.auth.getUser();
        currentUser = user;
        if (user) {
            let { data: p } = await supabase.from('profiles').select('role').eq('id', user.id).single();
            isAdmin = p?.role === 'admin';
        } else { isAdmin = false; }
        updateUI();
    }

    function updateUI() {
        let authDiv = document.getElementById('authButtons');
        let userDiv = document.getElementById('userInfo');
        let emailSpan = document.getElementById('userEmail');
        if (currentUser) {
            authDiv.style.display = 'none';
            userDiv.style.display = 'block';
            emailSpan.textContent = currentUser.email;
        } else {
            authDiv.style.display = 'flex';
            userDiv.style.display = 'none';
        }
    }

    // Public view
    async function loadPublic() {
        let { data: products } = await supabase.from('products').select('*');
        let html = `<div class="card"><h2>🌟 স্বাগতম</h2><p>ডিজিটাল প্রোডাক্ট পেতে অর্ডার করুন।</p></div><div class="card"><h2>📦 প্রোডাক্ট</h2><div class="product-grid">`;
        if (products?.length) {
            products.forEach(p => {
                html += `<div class="product-item"><h3>${p.name}</h3><p style="color:#ff4f63;font-size:20px;">৳${p.price}</p><button class="btn btn-primary" onclick="alert('অর্ডার করতে লগইন করুন')">অর্ডার</button></div>`;
            });
        } else { html += '<p>কোন প্রোডাক্ট নেই</p>'; }
        html += `</div></div>`;
        return html;
    }

    // Admin dashboard
    async function loadAdminDashboard() {
        let { count: prod } = await supabase.from('products').select('*', { count: 'exact', head: true });
        let { count: ord } = await supabase.from('orders').select('*', { count: 'exact', head: true });
        return `<div class="card"><h2>📊 ড্যাশবোর্ড</h2><div class="stats"><div class="stat-card"><h3>📦 প্রোডাক্ট</h3><p style="font-size:28px;">${prod || 0}</p></div><div class="stat-card"><h3>🛒 অর্ডার</h3><p style="font-size:28px;">${ord || 0}</p></div></div></div>`;
    }

    async function loadAdminProducts() {
        let { data: products } = await supabase.from('products').select('*');
        let html = `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;"><h2>📦 প্রোডাক্ট ম্যানেজ</h2><button class="btn btn-primary" onclick="addProduct()">+ নতুন</button></div><div class="product-grid">`;
        if (products?.length) {
            products.forEach(p => {
                html += `<div class="product-item"><h3>${p.name}</h3><p>৳${p.price}</p><button class="btn btn-danger" onclick="deleteProduct(${p.id})">ডিলিট</button></div>`;
            });
        } else { html += '<p>কোন প্রোডাক্ট নেই</p>'; }
        html += `</div></div>`;
        return html;
    }

    window.addProduct = async () => {
        let name = prompt('প্রোডাক্ট নাম');
        if (!name) return;
        let price = parseInt(prompt('মূল্য'));
        if (isNaN(price)) return;
        await supabase.from('products').insert([{ name, price }]);
        loadAppContent();
    };

    window.deleteProduct = async (id) => {
        if (!confirm('ডিলিট করবেন?')) return;
        await supabase.from('products').delete().eq('id', id);
        loadAppContent();
    };

    let currentView = 'dashboard';
    window.navigateTo = (view) => { currentView = view; loadAppContent(); };

    async function loadAppContent() {
        await loadUser();
        let container = document.getElementById('appContent');
        if (!currentUser) {
            container.innerHTML = await loadPublic();
            return;
        }
        if (isAdmin) {
            let content = currentView === 'dashboard' ? await loadAdminDashboard() : await loadAdminProducts();
            container.innerHTML = `<div class="admin-layout"><div class="sidebar"><h3>ASHIK ADMIN</h3><a onclick="navigateTo('dashboard')">📊 ড্যাশবোর্ড</a><a onclick="navigateTo('products')">📦 প্রোডাক্ট</a><hr><a onclick="logout()">🚪 লগআউট</a></div><div class="main-content">${content}</div></div>`;
        } else {
            container.innerHTML = await loadPublic();
        }
    }

    loadAppContent();
</script>
</body>
</html>
