<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASHIKDIGITAL - অ্যাডমিন লগইন</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Hind Siliguri", sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #0f172a 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      color: #e2e8f0;
      position: relative;
      overflow: hidden;
    }

    /* অ্যানিমেটেড ব্যাকগ্রাউন্ড */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 50%, rgba(255, 79, 99, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(91, 97, 255, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 500px;
      width: 100%;
    }

    .login-card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid rgba(255, 79, 99, 0.2);
      border-radius: 30px;
      padding: 48px 32px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4),
                  0 0 60px rgba(255, 79, 99, 0.1);
      backdrop-filter: blur(10px);
      animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-section {
      text-align: center;
      margin-bottom: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .logo-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #ff4f63, #ff9f43);
      border-radius: 20px;
      display: grid;
      place-items: center;
      font-size: 40px;
      color: white;
      box-shadow: 0 15px 30px rgba(255, 79, 99, 0.3);
    }

    .logo-text {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #ff4f63, #ff9f43);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-top: 8px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #cbd5e1;
      font-size: 14px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 79, 99, 0.2);
      border-radius: 12px;
      color: #e2e8f0;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.3s;
    }

    .form-input::placeholder {
      color: #64748b;
    }

    .form-input:focus {
      outline: none;
      border-color: #ff4f63;
      background: rgba(255, 79, 99, 0.05);
      box-shadow: 0 0 0 3px rgba(255, 79, 99, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, #ff4f63, #ff9f43);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 16px;
      font-family: inherit;
      box-shadow: 0 10px 20px rgba(255, 79, 99, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(255, 79, 99, 0.3);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
      animation: shake 0.4s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .error-message.show {
      display: flex;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid #10b981;
      color: #86efac;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
      animation: slideDown 0.3s ease;
    }

    .success-message.show {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-footer {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 79, 99, 0.1);
      text-align: center;
    }

    .form-footer p {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .toggle-link {
      color: #ff4f63;
      cursor: pointer;
      font-weight: 600;
      transition: color 0.3s;
    }

    .toggle-link:hover {
      color: #ff9f43;
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
      animation: slideUp 0.3s ease;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      transition: color 0.3s;
      font-size: 16px;
    }

    .password-toggle:hover {
      color: #ff4f63;
    }

    .password-field {
      position: relative;
    }

    .loader-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 640px) {
      .login-card {
        padding: 32px 24px;
        border-radius: 24px;
      }

      .logo-icon {
        width: 60px;
        height: 60px;
        font-size: 32px;
      }

      .logo-text {
        font-size: 24px;
      }

      .form-input {
        padding: 12px 14px;
        font-size: 16px;
      }

      .login-btn {
        padding: 12px 18px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="login-card">
    <div class="logo-section">
      <div class="logo-icon">🔐</div>
      <div class="logo-text">ASHIKDIGITAL</div>
      <div class="subtitle">অ্যাডমিন লগইন</div>
    </div>

    <div class="error-message" id="errorMessage">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText"></span>
    </div>

    <div class="success-message" id="successMessage">
      <i class="fas fa-check-circle"></i>
      <span id="successText"></span>
    </div>

    <!-- লগইন ফর্ম -->
    <div id="loginForm" class="form-section active">
      <div class="form-group">
        <label class="form-label"><i class="fas fa-envelope"></i> ইমেইল</label>
        <input type="email" class="form-input" id="loginEmail" placeholder="আপনার ইমেইল" required>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> পাসওয়ার্ড</label>
        <div class="password-field">
          <input type="password" class="form-input" id="loginPassword" placeholder="আপনার পাসওয়ার্ড" required>
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility('loginPassword')">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button class="login-btn" id="loginBtn" onclick="handleLogin()">
        <span id="loginBtnText"><i class="fas fa-sign-in-alt"></i> লগইন করুন</span>
      </button>

      <div class="form-footer">
        <p>অ্যাকাউন্ট নেই?</p>
        <span class="toggle-link" onclick="toggleForm()">রেজিস্টার করুন</span>
      </div>
    </div>

    <!-- রেজিস্টার ফর্ম -->
    <div id="registerForm" class="form-section">
      <div class="form-group">
        <label class="form-label"><i class="fas fa-user"></i> নাম</label>
        <input type="text" class="form-input" id="registerName" placeholder="আপনার নাম" required>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-envelope"></i> ইমেইল</label>
        <input type="email" class="form-input" id="registerEmail" placeholder="আপনার ইমেইল" required>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> পাসওয়ার্ড</label>
        <div class="password-field">
          <input type="password" class="form-input" id="registerPassword" placeholder="শক্তিশালী পাসওয়ার্ড" required>
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility('registerPassword')">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> পাসওয়ার্ড নিশ্চিত করুন</label>
        <div class="password-field">
          <input type="password" class="form-input" id="registerConfirmPassword" placeholder="পাসওয়ার্ড নিশ্চিত করুন" required>
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility('registerConfirmPassword')">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button class="login-btn" id="registerBtn" onclick="handleRegister()">
        <span id="registerBtnText"><i class="fas fa-user-plus"></i> রেজিস্টার করুন</span>
      </button>

      <div class="form-footer">
        <p>আগে থেকেই অ্যাকাউন্ট আছে?</p>
        <span class="toggle-link" onclick="toggleForm()">লগইন করুন</span>
      </div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'আপনার_SUPABASE_URL';
  const SUPABASE_KEY = 'আপনার_SUPABASE_KEY';
  let supabase = null;

  // ইনিশিয়ালাইজ Supabase
  function init() {
    try {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      
      // চেক করুন ইউজার আগেই লগইন আছে কিনা
      supabase.auth.onAuthStateChange(async (event, session) => {
        if (session) {
          window.location.href = '/admin-panel.html';
        }
      });
    } catch (error) {
      showError('Supabase সংযোগ ব্যর্থ। আপনার কনফিগারেশন চেক করুন।');
    }
  }

  // লগইন হ্যান্ডল করুন
  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
      showError('সব ফিল্ড পূরণ করুন');
      return;
    }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    document.getElementById('loginBtnText').innerHTML = '<div class="loader-spinner"></div> প্রক্রিয়াকরণ...';

    try {
      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        showError('ইমেইল বা পাসওয়ার্ড ভুল');
        return;
      }

      showSuccess('লগইন সফল! অ্যাডমিন প্যানেলে পাঠাচ্ছি...');
      setTimeout(() => {
        window.location.href = '/admin-panel.html';
      }, 1500);
    } catch (error) {
      showError('লগইন ব্যর্থ: ' + error.message);
    } finally {
      btn.disabled = false;
      document.getElementById('loginBtnText').innerHTML = '<i class="fas fa-sign-in-alt"></i> লগইন করুন';
    }
  }

  // রেজিস্টার হ্যান্ডল করুন
  async function handleRegister() {
    const name = document.getElementById('registerName').value.trim();
    const email = document.getElementById('registerEmail').value.trim();
    const password = document.getElementById('registerPassword').value;
    const confirmPassword = document.getElementById('registerConfirmPassword').value;

    if (!name || !email || !password || !confirmPassword) {
      showError('সব ফিল্ড পূরণ করুন');
      return;
    }

    if (password !== confirmPassword) {
      showError('পাসওয়ার্ড মিলছে না');
      return;
    }

    if (password.length < 6) {
      showError('পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে');
      return;
    }

    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    document.getElementById('registerBtnText').innerHTML = '<div class="loader-spinner"></div> প্রক্রিয়াকরণ...';

    try {
      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: {
            full_name: name
          }
        }
      });

      if (error) {
        showError('রেজিস্ট্রেশন ব্যর্থ: ' + error.message);
        return;
      }

      showSuccess('রেজিস্ট্রেশন সফল! এখন লগইন করুন।');
      setTimeout(() => {
        toggleForm();
        document.getElementById('registerName').value = '';
        document.getElementById('registerEmail').value = '';
        document.getElementById('registerPassword').value = '';
        document.getElementById('registerConfirmPassword').value = '';
      }, 1500);
    } catch (error) {
      showError('রেজিস্ট্রেশন ব্যর্থ: ' + error.message);
    } finally {
      btn.disabled = false;
      document.getElementById('registerBtnText').innerHTML = '<i class="fas fa-user-plus"></i> রেজিস্টার করুন';
    }
  }

  // ফর্ম টগল করুন
  function toggleForm() {
    document.getElementById('loginForm').classList.toggle('active');
    document.getElementById('registerForm').classList.toggle('active');
    clearMessages();
  }

  // পাসওয়ার্ড দৃশ্যমানতা টগল করুন
  function togglePasswordVisibility(fieldId) {
    const field = document.getElementById(fieldId);
    const btn = event.target.closest('.password-toggle');
    
    if (field.type === 'password') {
      field.type = 'text';
      btn.innerHTML = '<i class="fas fa-eye-slash"></i>';
    } else {
      field.type = 'password';
      btn.innerHTML = '<i class="fas fa-eye"></i>';
    }
  }

  // ত্রুটি বার্তা দেখান
  function showError(message) {
    const errorDiv = document.getElementById('errorMessage');
    document.getElementById('errorText').textContent = message;
    errorDiv.classList.add('show');
    setTimeout(() => {
      errorDiv.classList.remove('show');
    }, 4000);
  }

  // সাফল্য বার্তা দেখান
  function showSuccess(message) {
    const successDiv = document.getElementById('successMessage');
    document.getElementById('successText').textContent = message;
    successDiv.classList.add('show');
    setTimeout(() => {
      successDiv.classList.remove('show');
    }, 4000);
  }

  // বার্তা পরিষ্কার করুন
  function clearMessages() {
    document.getElementById('errorMessage').classList.remove('show');
    document.getElementById('successMessage').classList.remove('show');
  }

  // এন্টার কী দিয়ে সাবমিট করুন
  document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      if (document.getElementById('loginForm').classList.contains('active')) {
        handleLogin();
      } else {
        handleRegister();
      }
    }
  });

  // পেজ লোড হলে ইনিট করুন
  window.addEventListener('load', init);
</script>

</body>
</html>
